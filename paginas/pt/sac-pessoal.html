<!-- 
  PÁGINA: Canal Atendimento Pessoal (Slide 25)
  URA, interfone, estacionamento
-->
<div class="content-header">
    <h1 data-i18n="m1.pessoal.title"></h1>
</div>

<div class="content-body">

    <p class="lead" data-i18n="m1.pessoal.lead"></p>

    <!-- Situações de atendimento -->
    <h3 data-i18n="m1.pessoal.situations.title" style="margin-top: var(--spacing-lg);"></h3>

    <div class="interactive-cards">
        <div class="interactive-card">
            <div class="interactive-card-header">
                <span class="icon">📞</span>
                <span data-i18n="m1.pessoal.situations.ura.title"></span>
            </div>
            <div class="interactive-card-content">
                <p data-i18n="m1.pessoal.situations.ura.text"></p>
            </div>
        </div>

        <div class="interactive-card">
            <div class="interactive-card-header">
                <span class="icon">🔔</span>
                <span data-i18n="m1.pessoal.situations.interfone.title"></span>
            </div>
            <div class="interactive-card-content">
                <p data-i18n="m1.pessoal.situations.interfone.text"></p>
            </div>
        </div>

    </div>

    <!-- Foco do operador -->
    <h3 data-i18n="m1.pessoal.focus.title" style="margin-top: var(--spacing-xl);"></h3>

    <div class="highlight-box"
        style="background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%); border-left: 4px solid #ff9800;">
        <span class="icon">⚡</span>
        <div class="highlight-box-content">
            <ul style="margin: 0;">
                <li data-i18n="m1.pessoal.focus.item1"></li>
                <li data-i18n="m1.pessoal.focus.item2"></li>
                <li data-i18n="m1.pessoal.focus.item3"></li>
                <li data-i18n="m1.pessoal.focus.item4"></li>
            </ul>
        </div>
    </div>

    <!-- Exemplos de encaminhamentos -->
    <div class="accordion" style="margin-top: var(--spacing-lg);">
        <details>
            <summary>
                <span class="accordion-icon">🎫</span>
                <span data-i18n="m1.pessoal.examples.title"></span>
            </summary>
            <div class="qa-answer">
                <p data-i18n="m1.pessoal.examples.text"></p>
            </div>
        </details>
    </div>

    <!-- Destaque -->
    <div class="highlight-box sucesso" style="margin-top: var(--spacing-xl);">

        <div class="highlight-box-content">
            <h4 data-i18n="m1.pessoal.highlight.title"></h4>
            <p data-i18n="m1.pessoal.highlight.text"></p>
        </div>
    </div>

    <!-- Quiz rápido -->
    <div class="quiz-block" data-question="pessoal-q1" data-template="quiz" style="margin-top: var(--spacing-xl);">
        <p class="question" data-i18n="[html]m1.pessoal.quiz.q1.text"></p>
        <div class="options">
            <button class="quiz-option" data-correct="false" data-i18n="m1.pessoal.quiz.q1.options.a"></button>
            <button class="quiz-option" data-correct="false" data-i18n="m1.pessoal.quiz.q1.options.b"></button>
            <button class="quiz-option" data-correct="true" data-i18n="m1.pessoal.quiz.q1.options.c"></button>
        </div>
        <div class="feedback" style="display:none;" data-i18n="[html]m1.pessoal.quiz.q1.feedback"></div>
    </div>

</div>

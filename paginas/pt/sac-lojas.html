<!-- 
  PÁGINA: Canal Lojas (Slide 23)
  Atendimentos iniciados diretamente nas lojas
-->
<div class="content-header">
    <h1 data-i18n="m1.lojas.title"></h1>
</div>

<div class="content-body">

    <p class="lead" data-i18n="m1.lojas.lead"></p>

    <!-- Processo de Atendimento -->
    <h3 data-i18n="m1.lojas.flow.title" style="margin-top: var(--spacing-lg);"></h3>

    <div class="interactive-cards">
        <!-- Etapa 1 -->
        <div class="interactive-card" style="border-left: 4px solid #4caf50;">
            <div class="interactive-card-header">
                <span class="icon"
                    style="background: #4caf50; color: white; padding: 0.3rem 0.6rem; border-radius: 50%; font-size: 0.9rem;">1</span>
                <span data-i18n="m1.lojas.flow.step1.title"></span>
            </div>
            <div class="interactive-card-content">
                <p data-i18n="m1.lojas.flow.step1.text"></p>
            </div>
        </div>

        <!-- Etapa 2 -->
        <div class="interactive-card" style="border-left: 4px solid #4caf50;">
            <div class="interactive-card-header">
                <span class="icon"
                    style="background: #4caf50; color: white; padding: 0.3rem 0.6rem; border-radius: 50%; font-size: 0.9rem;">2</span>
                <span data-i18n="m1.lojas.flow.step2.title"></span>
            </div>
            <div class="interactive-card-content">
                <p data-i18n="m1.lojas.flow.step2.text"></p>
            </div>
        </div>

        <!-- Etapa 3 -->
        <div class="interactive-card" style="border-left: 4px solid #4caf50;">
            <div class="interactive-card-header">
                <span class="icon"
                    style="background: #4caf50; color: white; padding: 0.3rem 0.6rem; border-radius: 50%; font-size: 0.9rem;">3</span>
                <span data-i18n="m1.lojas.flow.step3.title"></span>
            </div>
            <div class="interactive-card-content">
                <p data-i18n="m1.lojas.flow.step3.text"></p>
            </div>
        </div>
    </div>

    <!-- O que o SAC faz -->
    <div class="highlight-box"
        style="margin-top: var(--spacing-xl); background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); border-left: 4px solid #1976d2;">

        <div class="highlight-box-content">
            <h4 data-i18n="m1.lojas.sac.title" style="color: #1565c0;"></h4>
            <ul style="margin: 0.5rem 0 0 1rem;">
                <li data-i18n="m1.lojas.sac.item1"></li>
                <li data-i18n="m1.lojas.sac.item2"></li>
                <li data-i18n="m1.lojas.sac.item3"></li>
            </ul>
        </div>
    </div>

    <!-- Destaque -->
    <div class="highlight-box sucesso" style="margin-top: var(--spacing-lg);">

        <div class="highlight-box-content">
            <h4 data-i18n="m1.lojas.highlight.title"></h4>
            <p data-i18n="m1.lojas.highlight.text"></p>
        </div>
    </div>

    <!-- Quiz rápido -->
    <div class="quiz-block" data-question="lojas-q1" data-template="quiz" style="margin-top: var(--spacing-xl);">
        <p class="question" data-i18n="[html]m1.lojas.quiz.q1.text"></p>
        <div class="options">
            <button class="quiz-option" data-correct="true" data-i18n="m1.lojas.quiz.q1.options.a"></button>
            <button class="quiz-option" data-correct="false" data-i18n="m1.lojas.quiz.q1.options.b"></button>
        </div>
        <div class="feedback" style="display:none;" data-i18n="[html]m1.lojas.quiz.q1.feedback"></div>
    </div>

</div>

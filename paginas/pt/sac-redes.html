<!-- 
  PÁGINA: Canal Redes Sociais (Slide 21)
  Fluxo de atendimento via Facebook, Instagram, Twitter/X
-->
<div class="content-header">
    <h1 data-i18n="m1.redes.title"></h1>
</div>

<div class="content-body">

    <p class="lead" data-i18n="m1.redes.lead"></p>

    <!-- Fluxo de Atendimento -->
    <h3 data-i18n="m1.redes.flow.title" style="margin-top: var(--spacing-lg);"></h3>

    <div class="interactive-cards">
        <!-- Etapa 1 -->
        <div class="interactive-card" style="border-left: 4px solid #1976d2;">
            <div class="interactive-card-header">
                <span class="icon"
                    style="background: #1976d2; color: white; padding: 0.3rem 0.6rem; border-radius: 50%; font-size: 0.9rem;">1</span>
                <span data-i18n="m1.redes.flow.step1.title"></span>
            </div>
            <div class="interactive-card-content">
                <p data-i18n="m1.redes.flow.step1.text"></p>
            </div>
        </div>

        <!-- Etapa 2 -->
        <div class="interactive-card" style="border-left: 4px solid #1976d2;">
            <div class="interactive-card-header">
                <span class="icon"
                    style="background: #1976d2; color: white; padding: 0.3rem 0.6rem; border-radius: 50%; font-size: 0.9rem;">2</span>
                <span data-i18n="m1.redes.flow.step2.title"></span>
            </div>
            <div class="interactive-card-content">
                <p data-i18n="m1.redes.flow.step2.text"></p>
            </div>
        </div>

        <!-- Etapa 3 -->
        <div class="interactive-card" style="border-left: 4px solid #1976d2;">
            <div class="interactive-card-header">
                <span class="icon"
                    style="background: #1976d2; color: white; padding: 0.3rem 0.6rem; border-radius: 50%; font-size: 0.9rem;">3</span>
                <span data-i18n="m1.redes.flow.step3.title"></span>
            </div>
            <div class="interactive-card-content">
                <p data-i18n="m1.redes.flow.step3.text"></p>
            </div>
        </div>

        <!-- Etapa 4 -->
        <div class="interactive-card" style="border-left: 4px solid #1976d2;">
            <div class="interactive-card-header">
                <span class="icon"
                    style="background: #1976d2; color: white; padding: 0.3rem 0.6rem; border-radius: 50%; font-size: 0.9rem;">4</span>
                <span data-i18n="m1.redes.flow.step4.title"></span>
            </div>
            <div class="interactive-card-content">
                <p data-i18n="m1.redes.flow.step4.text"></p>
            </div>
        </div>
    </div>

    <!-- Direcionamentos -->
    <h3 data-i18n="m1.redes.directions.title" style="margin-top: var(--spacing-xl);"></h3>

    <div class="accordion" style="margin-top: var(--spacing-md);">
        <details>
            <summary>
                <span class="accordion-icon">🎯</span>
                <span data-i18n="m1.redes.directions.sac.title"></span>
            </summary>
            <div class="qa-answer">
                <p data-i18n="m1.redes.directions.sac.text"></p>
            </div>
        </details>

        <details>
            <summary>
                <span class="accordion-icon">🏪</span>
                <span data-i18n="m1.redes.directions.loja.title"></span>
            </summary>
            <div class="qa-answer">
                <p data-i18n="m1.redes.directions.loja.text"></p>
            </div>
        </details>
    </div>

    <!-- Destaque -->
    <div class="highlight-box sucesso" style="margin-top: var(--spacing-xl);">

        <div class="highlight-box-content">
            <h4 data-i18n="m1.redes.highlight.title"></h4>
            <p data-i18n="m1.redes.highlight.text"></p>
        </div>
    </div>

    <!-- Quiz rápido -->
    <div class="quiz-block" data-question="redes-q1" data-template="quiz" style="margin-top: var(--spacing-xl);">
        <p class="question" data-i18n="[html]m1.redes.quiz.q1.text"></p>
        <div class="options">
            <button class="quiz-option" data-correct="false" data-i18n="m1.redes.quiz.q1.options.a"></button>
            <button class="quiz-option" data-correct="true" data-i18n="m1.redes.quiz.q1.options.b"></button>
            <button class="quiz-option" data-correct="false" data-i18n="m1.redes.quiz.q1.options.c"></button>
        </div>
        <div class="feedback" style="display:none;" data-i18n="[html]m1.redes.quiz.q1.feedback"></div>
    </div>

</div>

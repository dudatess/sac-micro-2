<!-- 
  PÁGINA: Canal Site (Slide 27)
  Formulários Fale Conosco
-->
<div class="content-header">
    <h1 data-i18n="m1.site.title"></h1>
</div>

<div class="content-body">

    <p class="lead" data-i18n="m1.site.lead"></p>

    <!-- Fluxo automático -->
    <div class="highlight-box"
        style="background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); border-left: 4px solid #4caf50; margin-top: var(--spacing-lg);">
        <span class="icon">⚡</span>
        <div class="highlight-box-content">
            <h4 data-i18n="m1.site.auto.title" style="color: #2e7d32;"></h4>
            <p data-i18n="m1.site.auto.text"></p>
        </div>
    </div>

    <!-- Fluxo de Atendimento -->
    <h3 data-i18n="m1.site.flow.title" style="margin-top: var(--spacing-xl);"></h3>

    <div class="interactive-cards">
        <!-- Etapa 1 -->
        <div class="interactive-card" style="border-left: 4px solid #9c27b0;">
            <div class="interactive-card-header">
                <span class="icon"
                    style="background: #9c27b0; color: white; padding: 0.3rem 0.6rem; border-radius: 50%; font-size: 0.9rem;">1</span>
                <span data-i18n="m1.site.flow.step1.title"></span>
            </div>
            <div class="interactive-card-content">
                <p data-i18n="m1.site.flow.step1.text"></p>
            </div>
        </div>

        <!-- Etapa 2 -->
        <div class="interactive-card" style="border-left: 4px solid #9c27b0;">
            <div class="interactive-card-header">
                <span class="icon"
                    style="background: #9c27b0; color: white; padding: 0.3rem 0.6rem; border-radius: 50%; font-size: 0.9rem;">2</span>
                <span data-i18n="m1.site.flow.step2.title"></span>
            </div>
            <div class="interactive-card-content">
                <p data-i18n="m1.site.flow.step2.text"></p>
            </div>
        </div>
    </div>

    <!-- Triagem do SAC -->
    <h3 data-i18n="m1.site.triagem.title" style="margin-top: var(--spacing-xl);"></h3>

    <div class="highlight-box"
        style="background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); border-left: 4px solid #1976d2;">

        <div class="highlight-box-content">
            <ul style="margin: 0;">
                <li data-i18n="m1.site.triagem.item1"></li>
                <li data-i18n="m1.site.triagem.item2"></li>
                <li data-i18n="m1.site.triagem.item3"></li>
            </ul>
        </div>
    </div>

    <!-- Destaque -->
    <div class="highlight-box sucesso" style="margin-top: var(--spacing-lg);">

        <div class="highlight-box-content">
            <h4 data-i18n="m1.site.highlight.title"></h4>
            <p data-i18n="m1.site.highlight.text"></p>
        </div>
    </div>

    <!-- Quiz rápido -->
    <div class="quiz-block" data-question="site-q1" data-template="quiz" style="margin-top: var(--spacing-xl);">
        <p class="question" data-i18n="[html]m1.site.quiz.q1.text"></p>
        <div class="options">
            <button class="quiz-option" data-correct="false" data-i18n="m1.site.quiz.q1.options.a"></button>
            <button class="quiz-option" data-correct="true" data-i18n="m1.site.quiz.q1.options.b"></button>
            <button class="quiz-option" data-correct="false" data-i18n="m1.site.quiz.q1.options.c"></button>
        </div>
        <div class="feedback" style="display:none;" data-i18n="[html]m1.site.quiz.q1.feedback"></div>
    </div>

</div>
